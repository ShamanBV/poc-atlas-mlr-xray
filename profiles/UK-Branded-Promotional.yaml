# UK-Branded-Promotional — primary v1 profile
#
# Branded HCP-targeted promotional emails sent in the UK market across
# all customers (Novartis, Takeda, GSK, Pfizer, AstraZeneca, …). Hard
# regulator: ABPI Code of Practice. Pharmacovigilance routing: MHRA
# Yellow Card Scheme. Approval-code formats vary by MAH; the catalog
# regex unions known formats and per-customer YAMLs tighten further.

schema_version: "1.0"
id: UK-Branded-Promotional
market: UK
languages: [en]
doc_types: [email]
description: |
  UK HCP-targeted branded promotional email. Audience: registered UK
  healthcare professionals. Carries claim language about a named brand
  with supporting trial data, requires audience-restriction bar, AE
  reporting box (Yellow Card), prescribing info link, MAH legal entity,
  approval code, and date of preparation.

# ─── Detection ─────────────────────────────────────────────────────
# When the API caller supplies `profile_id` explicitly the detection
# block is ignored. When it doesn't, the engine matches `required` /
# `fallback_signals` against the upload metadata + extracted asset.
detection:
  required_metadata:
    market: UK
    audience: HCP
    doc_type: email
  fallback_signals:
    filename_patterns:
      - "*_uk_*.pdf"
      - "UK *.pdf"
      - "*_GB_*.pdf"
    extracted_envelope_keys: [audience_restriction, pharmacovigilance]
    extracted_text_signals:
      - "MHRA"
      - "Yellow Card"
      - "For UK Healthcare Professionals"
      - "United Kingdom"

# ─── Cascade rules (structural obligations) ────────────────────────
# IDs reference OBLIGATION_CASCADE_SPEC.md §6.
cascade_rules:
  medical:
    - r_safety_reminder
    - r_adr_rate_footnote
    - r_trial_design_footnote
    - r_reference_list
    - r_abbreviations_defined
  legal:
    - r_audience_restriction_bar
    - r_mah_legal_entity
    - r_unsubscribe_privacy
    - r_confidentiality_notice
    - r_kol_conflict_disclosure
    # Deferred — patient-image consent / KOL permission validity require
    # a separate registry beyond v1 scope:
    # - r_kol_permission_validity
    # - r_patient_image_consent
  regulatory:
    - r_indication_block
    - r_prescribing_info_bar
    - r_ae_reporting_box
    - r_additional_monitoring_symbol
    - r_approval_code_format
    - r_date_of_preparation
    - r_brand_mark_registered

# ─── Precheck dependency rules (predicate-triggered) ───────────────
# IDs reference Atlas MLR X-Ray - new content/dependency_rules.yaml.
precheck_dependency_rules:
  medical:
    - r_safety_reminder_after_efficacy_claim
    - r_trial_design_footnote_when_data_cited
    - r_abbreviations_defined
    - r_reference_list_complete
  legal:
    - r_third_party_disclaimer_when_external_link
    - r_kol_conflict_disclosure
    - r_mah_legal_entity_in_footer
    - r_unsubscribe_privacy_links
  regulatory:
    - r_indication_when_drug_named
    - r_ae_reporting_when_promotional
    - r_audience_bar_when_hcp_only_profile
    - r_isi_when_dosing_mentioned
    - r_third_party_warning_when_external_link
    - r_approval_code_format
    - r_date_of_preparation_present_and_fresh
    - r_prescribing_info_link
    - r_brand_mark_registered

# ─── Auto-insert allowed ───────────────────────────────────────────
# When a cascade rule fires `violated` AND its id is in this set, the
# engine attaches a `proposed_block` from the canonical-block registry
# to the verdict. Atlas can then offer a one-click "insert from canonical"
# action in the X-Ray composer (writes the canonical text into the VVPM
# annotation; reviewer accepts in PromoMats). v1 is observe-only — the
# action is grey/disabled — but the proposal payload ships now so v1.5
# can enable it without re-running pipelines.
auto_insert_allowed:
  - r_audience_restriction_bar
  - r_mah_legal_entity
  - r_unsubscribe_privacy
  - r_confidentiality_notice
  - r_indication_block
  - r_prescribing_info_bar
  - r_ae_reporting_box
  - r_additional_monitoring_symbol
  - r_brand_mark_registered

# ─── Rule overrides (per-profile parameters) ───────────────────────
rule_overrides:
  # Approval code formats observed across UK MAHs in the pilot batch.
  # Tighten per-customer in `UK-Branded-Promotional.<customer>.yaml`.
  r_approval_code_format:
    code_regex: "(FA-\\d{8}|MAT-UK-\\d{6}|UK/[A-Z]{2}/[A-Z]{2}/\\d{2}/\\d{4})"
    rationale: "Union of FA-* (Novartis), MAT-UK-* (Takeda), UK/MAH/INN/yy/nnnn (legacy)"

  # Pharmacovigilance routing — MHRA Yellow Card Scheme.
  r_ae_reporting_box:
    expected_authority: "MHRA Yellow Card Scheme"
    expected_url_substring: "yellowcard"
    canonical_url: "https://yellowcard.mhra.gov.uk"
  r_ae_reporting_when_promotional:
    expected_authority: "MHRA Yellow Card Scheme"
    expected_url_substring: "yellowcard"

  # Date of preparation — ABPI Code 4.10. Fresh window matches the cascade.
  r_date_of_preparation:
    freshness_days_warn: 180
    freshness_days_block: 365
    accepted_formats: ["MMM YYYY", "Month YYYY", "MM/YYYY", "YYYY-MM"]
  r_date_of_preparation_present_and_fresh:
    freshness_days_warn: 180
    freshness_days_block: 365

  # Audience-restriction text variants observed in the corpus
  r_audience_restriction_bar:
    accepted_text_variants:
      - "FOR UK HEALTHCARE PROFESSIONALS ONLY"
      - "For UK Healthcare Professionals only"
      - "For Healthcare Professionals only"
      - "Intended for UK HCPs only"

  # Brand mark — UK uses ® (not ™ in promotional emails)
  r_brand_mark_registered:
    accepted_marks: ["®"]
    require_first_use: true

# ─── Profile-level metadata ────────────────────────────────────────
authority: "ABPI Code of Practice 2024"
authority_clauses_referenced:
  audience_restriction: "26.1"
  date_of_preparation: "4.10"
  mah_legal_entity:    "4.1"
  prescribing_info:    "4.1"
  reference_list:      "9.5"
  safety_balance:      "5.4"
  indication:          "5.1"
  third_party_link:    "28.1"
  trial_design:        "7.2"

# ─── Status ────────────────────────────────────────────────────────
status:
  v1_active: true
  rationale: "Primary v1 profile — first 20–30 approved UK emails feed pattern banks here."
  earliest_corpus_threshold: 20
  expected_full_coverage_threshold: 30
