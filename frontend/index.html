<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MLR X-Ray — Shaman (live backend)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <!-- Cache-bust the JSX/JS files: Babel-standalone caches by URL regardless
       of HTTP headers. Bump the v= when editing any of the JSX files. -->
  <script>window.__JSX_V__ = '5';</script>
  <script src="adapter.js?v=6"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { font-family: 'Noto Sans', sans-serif; background: #FAFAFA; color: #1F1F1F; font-size: 14px; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C7C7C7; border-radius: 3px; }     /* grey.300 */
    ::-webkit-scrollbar-thumb:hover { background: #A0A0A0; }                  /* grey.400 */
    textarea:focus { border-color: #00A66F !important; }                      /* primary.500 */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .pill {
      display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
      border-radius: 12px; font-size: 10px; font-weight: 600; letter-spacing: 0.4px;
    }
    .pill.dot { width: 6px; height: 6px; border-radius: 50%; padding: 0; }

    /* Backend-status banner — hidden by default; show with ?debug=1. */
    #backend-banner { display: none; }
    body.debug #backend-banner {
      display: flex; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1F1F1F; color: #FAFAFA; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 5px 12px; align-items: center; gap: 12px;
    }
    body.debug #backend-banner .ok  { color: #9DD5B8; }
    body.debug #backend-banner .err { color: #DB2777; }
    body.debug #backend-banner code { color: #C1E8D6; }

    /* ── Shaman MLR header (apryse-designer style + Frame 481) ─────── */
    .mlr-header { height: 48px; display: flex; align-items: center; flex-shrink: 0;
      background: #E5F6EE; border-bottom: 1px solid #EFEFEF; }
    .mlr-mark   { width: 48px; height: 48px; background: #00A66F; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; }
    .mlr-name-block { display: flex; align-items: center; gap: 8px; padding: 0 16px; }
    .mlr-brand  { font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: #00A66F; white-space: nowrap; }
    .mlr-doc    { font-size: 13px; font-weight: 600; color: #323232; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 380px; margin-left: 6px; }
    .mlr-doctype { display: inline-flex; align-items: center; font-size: 9px;
      font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: #00A66F;
      background: #fff; border: 1px solid #C1E8D6; padding: 2px 7px; border-radius: 10px; }
    .mlr-avatar { width: 28px; height: 28px; border-radius: 50%; background: #6F7E7F;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; letter-spacing: .3px; flex-shrink: 0;
      cursor: pointer; border: 2px solid #E5F6EE; box-shadow: 0 0 0 1px #BDBDBD;
      transition: transform .12s; }
    .mlr-avatar:hover { transform: translateY(-1px); }
    .mlr-avatar.alt   { background: #00A66F; }
    .mlr-savebtn { font-size: 13px; font-weight: 600; color: #fff; background: #00A66F;
      border: 1px solid #00A66F; border-radius: 6px; padding: 5px 16px; cursor: pointer;
      font-family: inherit; transition: all .14s; margin-left: 12px; }
    .mlr-savebtn:hover { background: #008859; border-color: #008859; }
    .mlr-libbtn  { font-size: 13px; font-weight: 500; color: #323232; background: #fff;
      border: 1px solid #BDBDBD; border-radius: 6px; padding: 5px 14px; cursor: pointer;
      font-family: inherit; transition: all .14s; margin-left: 8px;
      display: inline-flex; align-items: center; gap: 6px; }
    .mlr-libbtn:hover, .mlr-libbtn.open {
      background: #fff; border-color: #00A66F; color: #00A66F; }
    .mlr-libbtn .caret { font-size: 9px; transition: transform .12s; }
    .mlr-libbtn.open .caret { transform: rotate(180deg); }
    .mlr-user-avatar { width: 30px; height: 30px; border-radius: 50%; background: #6F7E7F;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; cursor: pointer;
      margin-left: 12px; margin-right: 14px; border: 2px solid #fff;
      box-shadow: 0 0 0 1px #BDBDBD; }

    /* Library popover */
    .lib-pop { position: absolute; top: 56px; right: 14px; z-index: 200; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.14);
      min-width: 340px; max-width: 480px; max-height: 60vh; overflow: hidden;
      display: flex; flex-direction: column; animation: libPopIn .14s ease-out; }
    @keyframes libPopIn { from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); } }
    .lib-pop-hdr  { padding: 10px 14px 6px; border-bottom: 1px solid #f3f4f6;
      font-size: 9px; font-weight: 700; color: #9ca3af; text-transform: uppercase;
      letter-spacing: .6px; }
    .lib-pop-list { overflow-y: auto; }
    .lib-pop-row  { display: flex; align-items: center; gap: 10px; padding: 9px 14px;
      cursor: pointer; border-bottom: 1px solid #f7f7f7; transition: background .1s; }
    .lib-pop-row:hover { background: #f9fafb; }
    .lib-pop-row.active { background: #E5F6EE; }
    .lib-pop-row .badge { flex-shrink: 0; width: 22px; height: 22px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
      font-weight: 700; color: #fff; background: #6F7E7F; }
    .lib-pop-row.active .badge { background: #00A66F; }
    .lib-pop-row .label { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .lib-pop-row .brand { font-size: 13px; font-weight: 600; color: #323232; }
    .lib-pop-row .meta  { font-size: 10px; color: #6F7E7F; text-transform: uppercase;
      letter-spacing: .4px; }
    .lib-pop-row .check { flex-shrink: 0; font-size: 14px; color: #00A66F; width: 16px;
      text-align: right; }
  </style>
</head>
<body>
<div id="root"></div>
<div id="backend-banner">backend: <span id="backend-status">connecting…</span></div>
<script>
  // Show backend debug banner only when ?debug=1 is in the URL.
  if (new URLSearchParams(window.location.search).get('debug') === '1') {
    document.body.classList.add('debug');
  }
</script>

<script type="text/babel" src="XRayData.jsx?v=6"></script>
<script type="text/babel" src="XRayEmail.jsx?v=6"></script>
<script type="text/babel" src="XRayDrawer.jsx?v=6"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

// ─── RESTRICTED PALETTE ───────────────────────────────────────────────────────
// Per design directive: greens (primary.50–.800), greys (.50–.800), warning
// yellow.600, critical pink.600. Everything else (purple/brown/red/orange/blue
// in the original prototype) maps onto these tokens.
//
// Mutation strategy: the prototype's helpers (`statusColor`, `laneToken`, …)
// were defined in XRayData.jsx, closing over the local `C` object. The script
// then exposes that same object reference as `window.C`. We MUTATE C's
// properties below — the helpers' references are unchanged but their reads
// now return the new values. The same is done for nested laneM/L/R objects.
const PALETTE = {
  // Greens
  primary50:  '#F6FCF9',
  primary100: '#E5F6EE',
  primary200: '#C1E8D6',
  primary300: '#9DD5B8',
  primary400: '#47C18E',
  primary500: '#00A66F',  // Shaman brand
  primary600: '#008859',
  primary700: '#006A45',
  primary800: '#004D31',
  // Greys
  grey50:  '#FAFAFA',
  grey100: '#F0F0F0',
  grey200: '#E0E0E0',
  grey300: '#C7C7C7',
  grey400: '#A0A0A0',
  grey500: '#7A7A7A',
  grey600: '#525252',
  grey700: '#3A3A3A',
  grey800: '#1F1F1F',
  // Status accents
  warning600: '#D97706',
  warning100: '#FEF3C7',
  warning300: '#FCD34D',
  critical600: '#DB2777',
  critical100: '#FCE7F3',
  critical300: '#F9A8D4',
  white: '#FFFFFF',
};

(function applyRestrictedPalette() {
  const C = window.C;
  if (!C) return;  // XRayData.jsx not loaded yet — should never happen
  Object.assign(C, {
    // Brand greens (kept names for prototype compatibility)
    green600: PALETTE.primary500,
    green400: PALETTE.primary400,
    green100: PALETTE.primary200,
    green50:  PALETTE.primary100,
    green25:  PALETTE.primary50,
    // Status — clean → primary; attn → warning yellow; miss → critical pink
    clean:       PALETTE.primary600,
    cleanBg:     PALETTE.primary50,
    cleanBorder: PALETTE.primary300,
    attn:        PALETTE.warning600,
    attnBg:      PALETTE.warning100,
    attnBorder:  PALETTE.warning300,
    miss:        PALETTE.critical600,
    missBg:      PALETTE.critical100,
    missBorder:  PALETTE.critical300,
    // Greys (prototype names → restricted greys)
    grey900: PALETTE.grey800,
    grey800: PALETTE.grey700,
    grey700: PALETTE.grey600,
    grey600: PALETTE.grey500,
    grey500: PALETTE.grey500,
    grey400: PALETTE.grey400,
    grey300: PALETTE.grey400,
    grey200: PALETTE.grey300,
    grey100: PALETTE.grey200,
    grey50:  PALETTE.grey100,
    grey25:  PALETTE.grey50,
    white:   PALETTE.white,
    // Misc — diff additions / removals; old "blue" repurposed
    blue:     PALETTE.primary500,
    blueBg:   PALETTE.primary50,
    addGreen: PALETTE.primary100,
    addText:  PALETTE.primary700,
    redLight: PALETTE.critical100,
  });
  // Lane chips — distinguished by intensity within the restricted palette.
  // Mutate in place so lane tokens captured by the helpers see the new values.
  Object.assign(C.laneM, { bg: PALETTE.primary100, text: PALETTE.primary700 });
  Object.assign(C.laneL, { bg: PALETTE.grey100,    text: PALETTE.grey700    });
  Object.assign(C.laneR, { bg: PALETTE.grey200,    text: PALETTE.grey800    });
})();

// ─── BACKEND CONFIG ───────────────────────────────────────────────────────────
// Default: localhost:8088 (uvicorn). Override via ?api= query string.
const params = new URLSearchParams(window.location.search);
const BACKEND = params.get('api') || 'http://localhost:8088';
// Default to the Cosentyx real fixture — biggest claim count → most
// interesting Layer 1 surface. ?asset=… overrides; the in-page <select>
// also writes to history.replaceState so the URL reflects current.
const INITIAL_ASSET_ID = params.get('asset') || 'real:cosentyx-uk-rheum-mda-001';

function renderBannerStatus(html, kind) {
  const el = document.getElementById('backend-status');
  el.innerHTML = html;
  el.className = kind || '';
}

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) {
    let body;
    try { body = await r.json(); } catch (_) { body = { error: { code: 'http_' + r.status, message: r.statusText } }; }
    const e = new Error(body?.detail?.error?.message || body?.error?.message || `HTTP ${r.status}`);
    e.code = body?.detail?.error?.code || body?.error?.code || `http_${r.status}`;
    throw e;
  }
  return r.json();
}

const fetchPrecheck = (assetId) =>
  fetchJson(`${BACKEND}/api/precheck/${encodeURIComponent(assetId)}`);
const fetchAssetList = () =>
  fetchJson(`${BACKEND}/api/assets`);

// ─── PAGED PREVIEW WITH BBOX OVERLAY ──────────────────────────────────────────
// Renders the source PDF as one PNG per page (via /api/preview/{id}/page/{n}.png)
// stacked vertically. A transparent overlay layer sits on top with one
// absolutely-positioned rectangle per bbox-bound zone — clicking the
// rectangle selects that zone in the X-Ray drawer; hovering it
// highlights both sides via shared `hoveredZone` / `selectedZone` state.
//
// Why PNG + overlay instead of an iframe: we can't position DOM over an
// iframe (the embedded PDF viewer paints its own canvas, doesn't expose
// page coords to the host page). Server-rendered PNGs with known DPI
// give us a deterministic point→pixel transform.
const PagedPreview = ({ assetId, asset, emailRef, hoveredZone, selectedZone, onHover, onSelect }) => {
  const [pages, setPages] = React.useState(null);
  const [pageError, setPageError] = React.useState(null);
  // Pane width drives the responsive page width. ResizeObserver below
  // keeps it in sync with the document pane (left of the drawer).
  const [paneWidth, setPaneWidth] = React.useState(900);
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    let cancelled = false;
    setPages(null);
    setPageError(null);
    fetchJson(`${BACKEND}/api/preview/${encodeURIComponent(assetId)}/pages`)
      .then(p => { if (!cancelled) setPages(p); })
      .catch(e => { if (!cancelled) setPageError(e); });
    return () => { cancelled = true; };
  }, [assetId]);

  // Group bbox-bound zones by page for the overlay layer.
  const zonesByPage = React.useMemo(() => {
    const map = new Map();
    (asset.zones || []).forEach(z => {
      if (!z.bbox || !z.page) return;
      if (!map.has(z.page)) map.set(z.page, []);
      map.get(z.page).push(z);
    });
    return map;
  }, [asset.zones]);

  // Watch container width — drives clamped grey gutters + page width.
  React.useEffect(() => {
    if (!containerRef.current) return;
    const update = () => {
      if (containerRef.current) setPaneWidth(containerRef.current.clientWidth);
    };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  if (pageError) {
    return (
      <div style={{ flex:1, background:PALETTE.grey100, padding:40, color:PALETTE.critical600 }}>
        Preview unavailable: {pageError.message}
      </div>
    );
  }

  // Responsive sizing per design directive:
  //   grey margin clamped to [50, 100] px on each side
  //   page width = pane width − 2*margin (with sensible floor)
  // Page height comes from aspect ratio so the image is never distorted.
  const margin = Math.max(50, Math.min(100, paneWidth * 0.08));
  const displayWidth = Math.max(240, paneWidth - 2 * margin);

  return (
    <div ref={r => { containerRef.current = r; if (emailRef) emailRef.current = r; }}
      style={{
        flex:1, background:PALETTE.grey100, overflowY:'auto',
        display:'flex', flexDirection:'column', alignItems:'center', padding:'20px 0 8px',
    }}>
      {!pages && (
        <div style={{ color:PALETTE.grey500, fontSize:13, padding:40 }}>Loading preview…</div>
      )}
      {pages && pages.pages.map(p => (
        <PreviewPage
          key={p.page}
          page={p}
          assetId={assetId}
          dpi={pages.dpi}
          displayWidth={displayWidth}
          zones={zonesByPage.get(p.page) || []}
          hoveredZone={hoveredZone}
          selectedZone={selectedZone}
          onHover={onHover}
          onSelect={onSelect}
        />
      ))}
      <div style={{ marginTop:10, fontSize:11, color:PALETTE.grey400, textAlign:'center', lineHeight:1.6 }}>
        Page render at {pages?.dpi || '—'} DPI · click a zone to cross-link with the X-Ray
      </div>
    </div>
  );
};

const PreviewPage = ({ page, assetId, dpi, displayWidth, zones, hoveredZone, selectedZone, onHover, onSelect }) => {
  // Width is supplied by the parent (responsive). Height derives from
  // aspect ratio — never set directly on the container so the PNG
  // can never get vertically squashed.
  const scale = displayWidth / page.width_pt;
  const pngUrl = `${BACKEND}/api/preview/${encodeURIComponent(assetId)}/page/${page.page}.png?dpi=${dpi}`;

  return (
    <div style={{
      position:'relative', width:displayWidth,
      background:PALETTE.white, marginBottom:16, borderRadius:4,
      boxShadow:'0 4px 16px rgba(0,0,0,0.12)', overflow:'hidden',
    }}>
      <img
        src={pngUrl}
        alt={`${assetId} page ${page.page}`}
        style={{ display:'block', width:'100%', height:'auto' }}
        draggable={false}
      />
      {zones.map(z => {
        const isHover = hoveredZone === z.id;
        const isSelected = selectedZone === z.id;
        const col = z.status === 'clean' ? PALETTE.primary600
                  : z.status === 'attn'  ? PALETTE.warning600
                                          : PALETTE.critical600;
        const bg  = z.status === 'clean' ? PALETTE.primary100
                  : z.status === 'attn'  ? PALETTE.warning100
                                          : PALETTE.critical100;
        const left   = z.bbox.x0 * scale;
        const top    = z.bbox.y0 * scale;
        const width  = (z.bbox.x1 - z.bbox.x0) * scale;
        const height = (z.bbox.y1 - z.bbox.y0) * scale;
        return (
          <div
            key={z.id}
            onMouseEnter={() => onHover(z.id)}
            onMouseLeave={() => onHover(null)}
            onClick={() => onSelect(z.id)}
            style={{
              position:'absolute', left, top, width, height,
              border:`${isSelected ? 2 : 1}px solid ${col}`,
              background: isHover || isSelected ? `${bg}80` : 'transparent',
              cursor:'pointer', borderRadius:2,
              transition:'background 0.12s, border-width 0.12s',
            }}
            title={z.label}
          >
            {z.pin != null && (
              <div style={{
                position:'absolute', top:-9, left:-9,
                width:18, height:18, borderRadius:'50%',
                background:col, color:PALETTE.white,
                fontSize:10, fontWeight:700, display:'flex',
                alignItems:'center', justifyContent:'center',
                fontFamily:"'JetBrains Mono', monospace",
              }}>{z.pin}</div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [assetId, setAssetId]       = useState(INITIAL_ASSET_ID);
  const [assetList, setAssetList]   = useState([]);
  const [asset, setAsset]           = useState(null);
  const [error, setError]           = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(true);
  const [hoveredZone, setHoveredZone] = useState(null);
  const [selectedZone, setSelectedZone] = useState(null);
  const [libOpen, setLibOpen]       = useState(false);
  const libRef = useRef(null);
  const emailRef = useRef(null);

  // Click outside the Library popover dismisses it.
  useEffect(() => {
    if (!libOpen) return;
    const onDoc = e => {
      if (libRef.current && !libRef.current.contains(e.target)) setLibOpen(false);
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [libOpen]);

  // Fetch the asset directory once on mount — drives the switcher.
  useEffect(() => {
    fetchAssetList().then(setAssetList).catch(() => setAssetList([]));
  }, []);

  // Fetch the precheck whenever assetId changes.
  useEffect(() => {
    let cancelled = false;
    setAsset(null);
    setError(null);
    setHoveredZone(null);
    setSelectedZone(null);
    renderBannerStatus('connecting…');
    fetchPrecheck(assetId)
      .then(raw => {
        if (cancelled) return;
        const adapted = window.adaptBackendAsset(raw);
        setAsset(adapted);
        renderBannerStatus(
          `<span class="ok">●</span> ${BACKEND} · ` +
          `${raw.zones.length} zones · verdict ${raw.verdict} · score ${raw.scores.overall} · ` +
          `library n=${raw.library.sample_size}`,
          'ok',
        );
        // Reflect current asset in the URL so the page is shareable.
        const url = new URL(window.location);
        url.searchParams.set('asset', assetId);
        window.history.replaceState({}, '', url);
      })
      .catch(e => {
        if (cancelled) return;
        setError(e);
        renderBannerStatus(
          `<span class="err">●</span> ${BACKEND} unreachable: ${e.message}`,
          'err',
        );
      });
    return () => { cancelled = true; };
  }, [assetId]);

  // Asset switching now lives in the header's Library popover, not the
  // backend debug banner. (Old picker-injection useEffect removed.)

  // ── loading + error states ───────────────────────────────────────────────
  if (error) {
    return (
      <div style={{
        height:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
        flexDirection:'column', gap:12, padding:40, textAlign:'center',
      }}>
        <div style={{ fontSize:24, fontWeight:600, color:PALETTE.critical600 }}>
          Backend unreachable
        </div>
        <div style={{ fontSize:14, color:PALETTE.grey500, maxWidth:560 }}>
          {error.message}
        </div>
        <div style={{ fontSize:12, color:PALETTE.grey400, fontFamily:'JetBrains Mono, monospace', marginTop:8 }}>
          {error.code}
        </div>
        <div style={{ fontSize:13, color:PALETTE.grey700, marginTop:20, lineHeight:1.6 }}>
          Start the backend: <code style={{
            background:PALETTE.grey100, padding:'2px 8px', borderRadius:4,
            fontFamily:'JetBrains Mono, monospace', fontSize:12,
          }}>cd backend && uvicorn mlr.precheck.api:app --port 8088</code>
        </div>
      </div>
    );
  }

  if (!asset) {
    return (
      <div style={{
        height:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
        gap:12, color:PALETTE.grey500, fontSize:14,
      }}>
        <div style={{
          width:18, height:18, border:`2px solid ${PALETTE.primary200}`,
          borderTopColor:PALETTE.primary500,
          borderRadius:'50%', animation:'spin 0.8s linear infinite',
        }}/>
        Loading precheck for {assetId}…
      </div>
    );
  }

  // ── derived header values ──────────────────────────────────────────────
  // Doc name: brand · market with optional code; reads from live meta.
  const m = asset.meta;
  const docName = m
    ? (m.code ? `${m.brand} · ${m.market} · ${m.code}` : `${m.brand} · ${m.market}`)
    : assetId;
  const docType = (m?.doc_type || 'document').toUpperCase().replace('_', ' ');

  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden' }}>

      {/* ── Shaman MLR X-Ray header (apryse-designer style + Frame 481) ── */}

        <div className="mlr-mark" title="Shaman">

              <path d="m 15.747,47.482 c 0.442,-3.227 2.813,-5.688 4.579,-8.181 2.295,-3.245 4.44,-7.598 4.194,-11.808 a 87.859,87.859 0 0 0 -0.098,-1.522 c -0.105,0.055 -0.21,0.106 -0.319,0.151 -0.05,0.38 -0.11,0.824 -0.188,1.269 -0.36,2.06 -2.722,5.91 -4.361,8.247 -2.291,3.252 -4.45,6.322 -4.423,11.803 0,0.002 0.174,3.269 0.616,0.041 z M 26.552,14.247 c 0.174,0.58 0.775,0.909 1.348,0.738 l 1.38,-0.417 a 1.1,1.1 0 0 0 0.726,-1.367 L 28.724,2.049 c 0,-0.017 -0.014,-0.032 -0.02,-0.05 A 1.683,1.683 0 0 0 28.655,1.776 C 28.244,0.377 26.239,-0.25 24.176,0.373 22.14,0.991 20.813,2.601 21.18,3.99 c -0.004,0.113 0.01,0.226 0.042,0.335 l 5.33,9.923 z M 18.705,1.722 A 2.105,2.105 0 0 0 18.55,1.472 c -1.091,-1.521 -3.583,-1.566 -5.56,-0.104 -1.957,1.448 -2.682,3.825 -1.637,5.346 0.046,0.137 0.112,0.266 0.194,0.383 l 10.39,9.932 c 0.454,0.63 1.27,0.812 1.819,0.406 l 1.325,-0.979 c 0.548,-0.404 0.626,-1.25 0.175,-1.878 L 18.75,1.773 A 0.443,0.443 0 0 0 18.706,1.722 Z M 9.872,7.256 A 2.554,2.554 0 0 0 9.635,7.063 C 8.051,5.934 5.627,6.665 4.22,8.7 2.828,10.709 2.954,13.232 4.481,14.379 a 1.7,1.7 0 0 0 0.323,0.31 L 18.3,21.045 c 0.116,0.081 0.243,0.147 0.375,0.195 a 4.082,4.082 0 0 1 2.589,-2.79 1.615,1.615 0 0 0 -0.603,-0.81 L 9.934,7.293 A 0.547,0.547 0 0 1 9.872,7.256 Z m 20.444,8.354 c -1.588,0.307 -3.868,1.245 -5.941,3.055 a 4.095,4.095 0 0 1 2.12,2.683 10.447,10.447 0 0 1 4.45,-2.348 c 0.914,-0.177 1.128,-1.278 0.867,-2.19 -0.27,-0.963 -0.793,-1.334 -1.496,-1.2 z M 6.026,34.405 c 0.108,0.028 0.22,0.039 0.33,0.031 l 10.7,-3.16 a 1.094,1.094 0 0 0 0.999,-1.177 l -0.109,-1.457 a 1.089,1.089 0 0 0 -1.16,-1.013 L 5.768,26.52 a 0.423,0.423 0 0 0 -0.051,0.009 1.645,1.645 0 0 0 -0.227,0 c -1.437,0.108 -2.469,1.96 -2.306,4.135 0.157,2.151 1.425,3.81 2.842,3.742 z M 0.232,19.39 c -0.677,2.358 0.18,4.688 1.917,5.252 0.121,0.079 0.253,0.14 0.391,0.184 l 14.21,1.442 c 0.736,0.218 1.495,-0.143 1.685,-0.804 L 18.87,23.958 A 4.113,4.113 0 0 1 18.552,22.661 1.505,1.505 0 0 0 17.899,22.272 L           <span className="mlr-brand">Shaman MLR X-Ray</span>
          <span className="mlr-doc" title={assetId}>{docName}</span>
          <span className="mlr-doctype">{docType}</span>
        </div>

        <div style={{flex:1}}/>

        {/* Reviewer collab avatars */}
        <div style={{display:'flex', alignItems:'center', marginRight:6}}>
          <span className="mlr-avatar" title="Frances Smith">FS</span>
          <span className="mlr-avatar alt" title="Maurice van Leeuwen" style={{marginLeft:-6}}>ML</span>
        </div>

        <button className="mlr-savebtn" onClick={()=>console.log('Save — coming soon')}>Save</button>

        <div ref={libRef} style={{position:'relative'}}>
          <button className={`mlr-libbtn${libOpen ? ' open' : ''}`} onClick={()=>setLibOpen(v=>!v)}>
            Library
            <span className="caret">▼</span>
          </button>
          {libOpen && (
            <div className="lib-pop">
              <div className="lib-pop-hdr">Library · {assetList.length} asset{assetList.length===1?'':'s'}</div>
              <div className="lib-pop-list">
                {assetList.length === 0 && (
                  <div style={{padding:14, fontSize:12, color:'#9ca3af', textAlign:'center'}}>
                    No assets available.
                  </div>
                )}
                {assetList.map(a => (
                  <div key={a.asset_id}
                    className={`lib-pop-row${a.asset_id === assetId ? ' active' : ''}`}
                    onClick={() => { setAssetId(a.asset_id); setLibOpen(false); }}>
                    <span className="badge">{(a.brand||'?').slice(0,2).toUpperCase()}</span>
                    <span className="label">
                      <span className="brand">{a.brand || a.asset_id}</span>
                      <span className="meta">{a.market||'—'} · {a.doc_type||'—'}{a.code?' · '+a.code:''}</span>
                    </span>
                    {a.asset_id === assetId && <span className="check">✓</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <span className="mlr-user-avatar" title="Signed-in user">JD</span>
      </div>

      {/* Body */}
      <div style={{ flex:1, display:'flex', overflow:'hidden', position:'relative' }}>
        <PagedPreview
          assetId={assetId}
          asset={asset}
          emailRef={emailRef}
          hoveredZone={hoveredZone}
          selectedZone={selectedZone}
          onHover={setHoveredZone}
          onSelect={setSelectedZone}
        />

        {drawerOpen && (
          <Drawer asset={asset} role="reviewer" onClose={()=>setDrawerOpen(false)}
            hoveredZone={hoveredZone} selectedZone={selectedZone}
            onZoneHover={setHoveredZone} onZoneSelect={setSelectedZone} emailRef={emailRef}/>
        )}

        {!drawerOpen && (
          <div onClick={()=>setDrawerOpen(true)} style={{
            position:'absolute', right:0, top:'50%', transform:'translateY(-50%)',
            background:PALETTE.primary500, color:PALETTE.white, borderRadius:'6px 0 0 6px',
            padding:'12px 5px', cursor:'pointer', writingMode:'vertical-rl',
            fontSize:10, fontWeight:700, letterSpacing:0.8, textTransform:'uppercase',
            display:'flex', alignItems:'center', gap:5,
          }}>
            <span className="material-icons" style={{ fontSize:13, transform:'rotate(90deg)', writingMode:'horizontal-tb' }}>science</span>
            X-Ray
          </div>
        )}
      </div>
    </div>

};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
