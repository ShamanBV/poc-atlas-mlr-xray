<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document X-Ray – Shaman</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:#f3f4f6;font-size:13px;color:#111827;}
#root{height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

/* ── SHAMAN HEADER ─────────────────────── */
.sh-header{height:40px;background:#d1fae5;border-bottom:1px solid #a7f3d0;display:flex;align-items:center;padding:0 16px;flex-shrink:0;}
.sh-mark{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#059669,#10b981);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(5,150,105,.3);flex-shrink:0;}
.sh-wordmark{font-size:13px;font-weight:800;color:#065f46;letter-spacing:-.4px;margin-left:8px;}
.sh-sep{width:1px;height:16px;background:#a7f3d0;margin:0 12px;}
.sh-crumb{display:flex;align-items:center;gap:5px;font-size:11px;}
.sh-crumb span{color:#6ee7b7;}
.sh-crumb b{color:#047857;font-weight:600;}
.sh-nav{display:flex;align-items:center;gap:1px;margin-left:auto;}
.sh-navbtn{padding:4px 10px;font-size:11px;font-weight:500;color:#047857;border:none;background:transparent;border-radius:4px;cursor:pointer;transition:background .12s;}
.sh-navbtn:hover{background:rgba(5,150,105,.12);}
.sh-avatar{width:26px;height:26px;border-radius:50%;background:#059669;display:flex;align-items:center;justify-content:center;margin-left:8px;cursor:pointer;}

/* ── SHAMAN MLR HEADER ─────────────────── */
.mlr-header{height:48px;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;background:#fff;border-bottom:1px solid #e5e7eb;}
.mlr-mark{width:36px;height:36px;border-radius:6px;background:#065f46;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 3px rgba(6,95,70,.25);}
.mlr-title{font-size:14px;font-weight:700;color:#065f46;letter-spacing:-.2px;white-space:nowrap;}
.mlr-sep{width:1px;height:20px;background:#e5e7eb;}
.mlr-doc{font-size:12px;font-weight:500;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px;}
.mlr-doctype{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#047857;background:#d1fae5;border:1px solid #a7f3d0;padding:2px 7px;border-radius:10px;}
.mlr-avatar{width:28px;height:28px;border-radius:50%;background:#374151;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.3px;flex-shrink:0;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1px #e5e7eb;transition:transform .12s;}
.mlr-avatar:hover{transform:translateY(-1px);}
.mlr-avatar.alt{background:#065f46;}
.mlr-libbtn{font-size:11px;font-weight:600;color:#065f46;background:#fff;border:1px solid #6ee7b7;border-radius:5px;padding:5px 12px;cursor:pointer;transition:all .14s;font-family:inherit;}
.mlr-libbtn:hover{background:#f0fdf4;}

/* ── TOOLBAR ───────────────────────────── */
.toolbar{height:40px;display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;background:#fff;border-bottom:1px solid #e5e7eb;}

/* ── LAYOUT ────────────────────────────── */
.main{flex:1;display:flex;overflow:hidden;}
.pdf-pane{flex:1;overflow:auto;padding:18px 22px;background:#f9fafb;}
.right-panel{width:410px;background:#fff;border-left:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.btmbar{display:flex;align-items:center;gap:8px;padding:0 14px;height:36px;flex-shrink:0;background:#fff;border-top:1px solid #e5e7eb;}

/* ── BUTTONS ───────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .14s;white-space:nowrap;font-family:inherit;line-height:1.4;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:#059669;color:#fff;border-color:#059669;}
.btn-primary:hover:not(:disabled){background:#047857;}
.btn-ghost{background:#fff;color:#555;border-color:#e5e7eb;}
.btn-ghost:hover:not(:disabled){background:#f8f7f5;}
.btn-danger{color:#dc2626;border-color:#fca5a5;background:#fff;}
.btn-danger:hover{background:#fef2f2;}
.btn-accept{color:#059669;border-color:#6ee7b7;background:#fff;}
.btn-accept:hover{background:#f0fdf4;}
.btn-icon{padding:2px 5px;font-size:12px;border:none;background:transparent;cursor:pointer;border-radius:3px;color:#d1d5db;transition:color .1s,background .1s;font-family:inherit;}
.btn-icon:hover{background:#f3f3f1;color:#555;}
.btn-icon.g:hover{color:#059669;background:#f0fdf4;}
.btn-icon.r:hover{color:#dc2626;background:#fef2f2;}
.ds-btn{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid;transition:opacity .14s;font-family:inherit;}
.ds-btn:hover{opacity:.72;}

/* ── SEGMENTED CONTROL ─────────────────── */
.seg-ctrl{display:inline-flex;background:#f3f4f6;border-radius:6px;padding:2px;gap:1px;}
.seg-btn{padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6b7280;transition:all .12s;font-family:inherit;white-space:nowrap;}
.seg-btn.active{background:#fff;color:#111827;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.seg-btn:not(.active):hover{color:#374151;}

/* ── ASSET META CARD ───────────────────── */
.asset-meta-card{margin:10px 12px 2px;border:1.5px solid #e5e7eb;border-radius:8px;overflow:hidden;flex-shrink:0;}
.amc-hdr{display:flex;align-items:center;gap:7px;padding:7px 11px;background:#f9fafb;border-bottom:1px solid #e5e7eb;cursor:pointer;user-select:none;}
.amc-body{display:grid;grid-template-columns:1fr 1fr;background:#fff;}
.amc-cell{padding:7px 11px;border-top:1px solid #f3f4f6;}
.amc-cell:nth-child(odd){border-right:1px solid #f3f4f6;}
.meta-key{font-size:9px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px;}
.meta-val{font-size:13px;font-weight:500;color:#111827;}

/* ── FILTER CHIPS ──────────────────────── */
.fchip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .13s;white-space:nowrap;}
.fchip.active{border-color:currentColor;background:rgba(0,0,0,.04);}
.fchip:not(.active){opacity:.45;}
.fchip:hover{opacity:1;}

/* ── ANN RECTS — border only ───────────── */
.ann-rect{position:absolute;cursor:pointer;border-radius:1px;transition:box-shadow .15s;}
.ann-rect:hover{z-index:15!important;}
.ann-rect.sel{z-index:20!important;}
.ann-rect .rl{position:absolute;top:-18px;left:-1px;font-size:8px;font-weight:700;letter-spacing:.5px;padding:1px 5px;border-radius:2px 2px 0 0;color:#fff;white-space:nowrap;pointer-events:none;font-family:'SF Mono',Menlo,monospace;opacity:0;transition:opacity .14s;}
.ann-rect:hover .rl,.ann-rect.sel .rl{opacity:1;}

/* ── GROUP HEADER ──────────────────────── */
.grp-hdr{display:flex;align-items:center;padding:7px 13px;cursor:pointer;user-select:none;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:#fff;z-index:2;transition:background .1s;}
.grp-hdr:hover{background:#f9fafb;}

/* ── CLAIM CARD ────────────────────────── */
.claim-card{border-bottom:1px solid #f3f4f6;background:#fff;}
.claim-header{display:flex;align-items:flex-start;gap:8px;padding:9px 13px 8px 26px;cursor:pointer;transition:background .1s;position:relative;}
.claim-header:hover{background:#f9fafb;}
.claim-header.sel{background:#f4fbf7;}
.claim-assets{padding:0 13px 9px 42px;display:flex;flex-direction:column;gap:4px;}
.asset-row{display:flex;align-items:flex-start;gap:6px;padding:4px 8px;border-radius:5px;cursor:pointer;transition:background .1s;}
.asset-row:hover{background:#f4fbf7;}
.asset-row.sel{background:#ecfaf4;}

/* ── ANN ROW (non-claim) ───────────────── */
.ann-row{padding:7px 13px 7px 26px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:background .1s;position:relative;}
.ann-row:hover{background:#f9fafb;}
.ann-row.sel{background:#f4fbf7;}
.ann-row.done{opacity:.44;}

/* ── PANEL SLIDE ───────────────────────── */
.panel-view{position:absolute;inset:0;background:#fff;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.panel-view.vis{transform:translateX(0);}

/* ── STRUCTURED ────────────────────────── */
.md-wrap{flex:1;overflow:auto;padding:14px 16px;font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:11px;line-height:1.8;color:#374151;}
.md-type-h{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin:0 0 5px;padding-bottom:3px;border-bottom:1px solid #eee;}
.md-item{display:flex;gap:7px;padding:1px 0;}
.md-ref{font-size:10px;color:#9ca3af;margin-left:16px;line-height:1.6;}

/* ── TABS ──────────────────────────────── */
.tab-btn{padding:9px 13px 8px;font-size:12px;background:transparent;border:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .14s;font-family:inherit;white-space:nowrap;}

/* ── TOOLTIP ───────────────────────────── */
.tip-w{position:relative;display:inline-flex;}
.tip-b{position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:11px;padding:5px 10px;border-radius:5px;pointer-events:none;z-index:999;line-height:1.45;text-align:center;}

/* ── CONFIRM ───────────────────────────── */
.cpop{position:absolute;bottom:calc(100%+5px);right:0;background:#fff;border:1px solid #d1d5db;border-radius:7px;padding:11px 13px;box-shadow:0 6px 20px rgba(0,0,0,.12);width:186px;z-index:500;}

/* ── MODAL ─────────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fIn .14s;}
.mbox{background:#fff;border-radius:9px;padding:20px 22px;width:400px;box-shadow:0 16px 48px rgba(0,0,0,.18);}

/* ── TOAST ─────────────────────────────── */
.tw{position:fixed;top:86px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.t{background:#1a1a1a;color:#fff;padding:7px 14px;border-radius:6px;font-size:11.5px;font-weight:500;animation:tIn .17s ease;box-shadow:0 3px 10px rgba(0,0,0,.18);}
.t.s{background:#059669;}.t.w{background:#d97706;}.t.i{background:#2563eb;}

/* ── FORM ──────────────────────────────── */
select,textarea{font-family:inherit;font-size:12px;border:1px solid #d1d5db;border-radius:5px;padding:5px 8px;width:100%;outline:none;transition:border-color .14s;}
select:focus,textarea:focus{border-color:#059669;}
textarea{resize:vertical;line-height:1.55;}

/* ── MISC ──────────────────────────────── */
.spin{animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@keyframes fIn{from{opacity:0;}to{opacity:1;}}
@keyframes tIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}
.fadein{animation:fIn .17s ease;}
.add-ov{position:absolute;inset:0;cursor:crosshair;z-index:50;background:rgba(5,150,105,.04);border:2px dashed rgba(5,150,105,.4);display:flex;align-items:center;justify-content:center;}

.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;}
.confbar{height:3px;background:#f0f0f0;border-radius:2px;overflow:hidden;}
.confbar-fill{height:100%;border-radius:2px;transition:width .3s;}
.sl{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.55px;margin-bottom:4px;}

/* ── MULTI-SELECT CHECKBOX ─────────────────────────── */
.sel-check{width:15px;height:15px;border-radius:3px;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .12s,background .12s;margin-top:1px;}
.sel-check:hover{border-color:#059669;}
.sel-check.checked{background:#059669;border-color:#059669;}
.sel-check.partial{background:#d1fae5;border-color:#059669;}

/* ── BULK ACTION BAR ───────────────────────────────── */
.bulk-bar{position:absolute;bottom:12px;left:12px;right:12px;background:#1f2937;border-radius:8px;display:flex;align-items:center;gap:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.22);z-index:30;animation:slideUp .18s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, createContext, useContext } = React;

/* ═══════════════════════════════════════════════════════
   COLOR PALETTE — green + grey only
   primary.800 = #065f46  (Claims — darkest)
   primary.600 = #059669  (Content/Body)
   primary.300 = #6ee7b7  (Visuals)
   grey.800    = #374151  (Regulatory / Legal / Reference)
   grey.400    = #9ca3af  (Footnote, subdued)
═══════════════════════════════════════════════════════ */
const P800 = '#065f46';
const P600 = '#059669';
const P300 = '#6ee7b7';
const G800 = '#374151';
const G400 = '#9ca3af';

const TC = {
  CLAIM:      {color:P800, glow:`rgba(6,95,70,.7)`,   short:'Claim',      group:'claim'},
  BODY:       {color:P600, glow:`rgba(5,150,105,.7)`, short:'Content',    group:'content'},
  AUD_RESTR:  {color:G800, glow:`rgba(55,65,81,.7)`, short:'Audience',   group:'legal'},
  DATA_VIS:   {color:P300, glow:`rgba(110,231,183,.7)`,short:'Visual',    group:'visual'},
  REFERENCE:  {color:G800, glow:`rgba(55,65,81,.7)`,  short:'Reference',  group:'legal'},
  FOOTNOTE:   {color:G400, glow:`rgba(156,163,175,.7)`,short:'Footnote',  group:'legal'},
  REGULATORY: {color:G800, glow:`rgba(55,65,81,.7)`,  short:'Regulatory', group:'legal'},
  LEGAL:      {color:G800, glow:`rgba(55,65,81,.7)`,  short:'Legal',      group:'legal'},
};

const SC={
  edited:    {bg:'#f0fdf4',c:'#065f46',l:'edited'},
  accepted:  {bg:'#d1fae5',c:'#065f46',l:'accepted'},
  new:       {bg:'#ecfdf5',c:'#059669',l:'new'},
  processing:{bg:'#f9fafb',c:'#6b7280',l:'processing…'},
};
const cc=v=>v>=70?P600:v>=40?'#d97706':'#dc2626';

/* ── TOAST ──────────────────────────────────────── */
const TC2=createContext(null);
function ToastProvider({children}){
  const [ts,setTs]=useState([]);
  const show=useCallback((msg,type='s')=>{
    const id=Date.now(); setTs(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setTs(p=>p.filter(t=>t.id!==id)),2400);
  },[]);
  return <TC2.Provider value={show}>{children}<div className="tw">{ts.map(t=><div key={t.id} className={`t ${t.type}`}>{t.msg}</div>)}</div></TC2.Provider>;
}

/* ── TOOLTIP ────────────────────────────────────── */
function Tip({text,wide,children}){
  const [s,set]=useState(false);
  return <span className="tip-w" onMouseEnter={()=>set(true)} onMouseLeave={()=>set(false)}>{children}{s&&<span className="tip-b" style={{width:wide?200:'auto',whiteSpace:wide?'normal':'nowrap'}}>{text}</span>}</span>;
}

/* ── CONFIRM ────────────────────────────────────── */
function Confirm({text,onConfirm,children}){
  const [o,set]=useState(false); const ref=useRef();
  useEffect(()=>{
    if(!o) return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))set(false);};
    document.addEventListener('mousedown',h); return()=>document.removeEventListener('mousedown',h);
  },[o]);
  return <span style={{position:'relative',display:'inline-flex'}} ref={ref}><span onClick={e=>{e.stopPropagation();set(v=>!v);}}>{children}</span>{o&&<div className="cpop"><div style={{fontSize:12,color:'#333',marginBottom:9,fontWeight:500}}>{text}</div><div style={{display:'flex',gap:5}}><button className="btn btn-ghost" onClick={()=>set(false)}>Cancel</button><button className="btn btn-danger" onClick={()=>{set(false);onConfirm();}}>Delete</button></div></div>}</span>;
}

/* ── MODAL ──────────────────────────────────────── */
function Modal({open,title,onOk,onCancel,children}){
  if(!open) return null;
  return <div className="mbg" onClick={onCancel}><div className="mbox fadein" onClick={e=>e.stopPropagation()}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>{title}</div>{children}<div style={{display:'flex',justifyContent:'flex-end',gap:7,marginTop:16}}><button className="btn btn-ghost" onClick={onCancel}>Cancel</button><button className="btn btn-primary" onClick={onOk}>Add</button></div></div></div>;
}

/* ═══════════════════════════════════════════════════════
   DATA — Claims have nested assets (text + visual children)

   The arrays below are the prototype's INLINE MOCK DATA. We DON'T use
   them — App boots empty and populates from /api/document-xray/{id}
   instead (see fetchDocumentXray + the useEffect in App). Kept here
   as the schema reference and for fallback when the backend is
   unreachable.
═══════════════════════════════════════════════════════ */
const _PROTOTYPE_INIT_CLAIMS = [
  {
    id:'c1',
    type:'CLAIM',
    name:'HFrEF Stability Risk',
    headline:'Your HFrEF patients are living at risk, even those who appear stable.',
    status:'edited',
    conf:88,
    refs:['1','2','3'],
    rect:{t:440,l:5,w:432,h:92},
    assets:[
      {id:'c1a1',kind:'text', text:'Your HFrEF patients are living at risk, even those who appear stable.', conf:90, status:'edited', rect:{t:440,l:5,w:432,h:46}},
      {id:'c1a2',kind:'text', text:'Disease progression in HFrEF is often silent, masking the serious nature of disease.', conf:70, status:'edited', rect:{t:440,l:450,w:247,h:92}},
      {id:'c1a3',kind:'visual',text:'Clinical outcomes infographic — JAMES case', conf:80, status:'edited', rect:{t:540,l:5,w:692,h:207}},
    ]
  },
  {
    id:'c2',
    type:'CLAIM',
    name:'CARDIOMAX Mortality Benefit',
    headline:'Patients with HFrEF who seem stable can have more life with CARDIOMAX® vs ACEi.',
    status:'edited',
    conf:75,
    refs:['4','5','6'],
    rect:{t:540,l:5,w:500,h:80},
    assets:[
      {id:'c2a1',kind:'text', text:'Reduces Risk of Death at 5 Years (Barcelona Bio-HF Calculator)', conf:75, status:'edited', rect:{t:550,l:5,w:440,h:36}},
      {id:'c2a2',kind:'visual',text:'Bar chart — 23% CV death, 18% HF hospitalisations, 21% all-cause mortality', conf:82, status:'edited', rect:{t:595,l:5,w:360,h:120}},
    ]
  },
];

const _PROTOTYPE_INIT_OTHER = [
  {id:'a3', type:'AUD_RESTR', sub:null, conf:30, status:'edited', text:'This is a promotional material intended for healthcare professionals only', fullText:'Not for distribution to patients.', refs:[], rect:{t:92,l:5,w:692,h:37}},
  {id:'a5', type:'BODY', sub:'SALUTATION', conf:100, status:'edited', text:'Dear {{Account.Name}},', fullText:'Personalised salutation using CRM merge tag {{Account.Name}}.', refs:[], rect:{t:356,l:5,w:290,h:36}},
  {id:'a6', type:'BODY', sub:'CUSTOM_TEXT', conf:90, status:'edited', text:'{{customText}}', fullText:'Dynamic content field for personalised body copy.', refs:[], rect:{t:398,l:5,w:210,h:36}},
  {id:'a1', type:'DATA_VIS', sub:'LOGO', conf:80, status:'edited', text:'Brand logo — CARDIOMAX™', fullText:'Brand logo (CARDIOMAX™ / sacubitril/valsartan) in the email header.', refs:[], rect:{t:5,l:5,w:225,h:78}},
  {id:'a2', type:'DATA_VIS', sub:'BANNER', conf:80, status:'edited', text:'Brand visual banner', fullText:'Product visual figure in the upper-right of the email header.', refs:[], rect:{t:5,l:243,w:454,h:78}},

// Document pane width — backend rect coords are PDF points; multiply
// by (DOC_DISPLAY_WIDTH / page.width_pt) to get pixel coords. The
// prototype's email mock was 700px wide; we keep the same display
// width so the rest of the prototype's layout maths still works.
const DOC_DISPLAY_WIDTH = 700;

async function fetchJson(url){
  const r = await fetch(url);
  if(!r.ok){
    let body; try{body=await r.json();}catch(_){body={error:{code:'http_'+r.status,message:r.statusText}};}
    const e = new Error(body?.detail?.error?.message || body?.error?.message || `HTTP ${r.status}`);
    e.code = body?.detail?.error?.code || body?.error?.code || `http_${r.status}`;
    throw e;
  }
  return r.json();
}
const fetchDocumentXray = id => fetchJson(`${BACKEND}/api/document-xray/${encodeURIComponent(id)}`);
const fetchPages        = id => fetchJson(`${BACKEND}/api/preview/${encodeURIComponent(id)}/pages`);
const fetchAssetList    = ()  => fetchJson(`${BACKEND}/api/assets`);

// Scale a backend payload's rect coords (PDF points) → pixels using
// the page metadata. Mutates a shallow copy.
function scaleRectsInPayload(payload, pages){
  if(!pages || !pages.pages || !pages.pages.length) return payload;
  // Single-page assumption for the POC; for multi-page we'd index by rect.page.
  const p = pages.pages[0];
  const scale = DOC_DISPLAY_WIDTH / p.width_pt;
  const scaleR = r => r ? {t:r.t*scale, l:r.l*scale, w:r.w*scale, h:r.h*scale} : r;
  return {
    ...payload,
    _docHeight: p.height_pt * scale,
    claims: (payload.claims||[]).map(c => ({
      ...c, rect: scaleR(c.rect),
      assets: (c.assets||[]).map(a => ({...a, rect: scaleR(a.rect)})),
    })),
    elements: (payload.elements||[]).map(e => ({...e, rect: scaleR(e.rect)})),
  };
}

}

/* ── OUTLINE GROUP ROW (collapsed summary) ─────────── */
function OutlineGroupRow({label, color, count, open, onToggle, acceptedCount, onAcceptAll}){
  const [hover,setHover]=useState(false);
  const allAccepted = typeof acceptedCount==='number' && acceptedCount===count;
  return (
    <div onClick={onToggle}
      onMouseEnter={()=>setHover(true)}
      onMouseLeave={()=>setHover(false)}
      style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',
        borderBottom:'1px solid #f3f4f6',cursor:'pointer',transition:'background .1s',
        background:hover?'#f9fafb':'transparent'}}>
      <span style={{fontSize:10,color:color,transition:'transform .18s',display:'inline-block',
        transform:open?'rotate(90deg)':'none',fontWeight:700}}>▶</span>
      <span style={{fontSize:11,fontWeight:700,color,textTransform:'uppercase',letterSpacing:.5}}>{label}</span>
      <span style={{fontSize:11,color:'#9ca3af',fontWeight:400}}>· {count} {count===1?'item':'items'}</span>
      {typeof acceptedCount==='number'&&acceptedCount>0&&(
        <span style={{fontSize:9,fontWeight:600,color:allAccepted?P600:'#9ca3af',
          background:allAccepted?P300+'30':'#f3f4f6',
          border:`1px solid ${allAccepted?P300:'#e5e7eb'}`,
          padding:'1px 7px',borderRadius:10,marginLeft:2}}>
          {allAccepted?'✓ all':''+acceptedCount+'/'+count}
        </span>
      )}
      {!open&&<span style={{fontSize:9,fontWeight:700,color,background:color+'15',
        border:`1px solid ${color}33`,padding:'1px 7px',borderRadius:10,marginLeft:2,letterSpacing:.4}}>COLLAPSED</span>}
      <div style={{flex:1}}/>
      {/* Quick accept all — visible on hover or when not all accepted */}
      {onAcceptAll&&!allAccepted&&(
        <button className="btn-icon g"
          style={{opacity:hover?1:0,transition:'opacity .15s',fontSize:11,
            padding:'2px 8px',border:`1px solid ${P300}`,borderRadius:4,
            color:P600,background:'#f0fdf4',fontWeight:600,display:'flex',alignItems:'center',gap:3}}
          onClick={e=>{e.stopPropagation();onAcceptAll();}}
          title={`Accept all ${label}`}>
          ✓ Accept all
        </button>
      )}
      {allAccepted&&(
        <span style={{fontSize:10,color:P600,fontWeight:600,opacity:.7}}>✓ done</span>
      )}
    </div>
  );
}

      {/* Other grouped */}
      {['AUD_RESTR','BODY','DATA_VIS','REFERENCE','REGULATORY','LEGAL'].map(type=>{
        const items=other.filter(a=>a.type===type);
        if(!items.length) return null;
        const cfg=TC[type]||TC.BODY;
        return (
          <div key={type} style={{marginBottom:12}}>
            <div className="md-type-h" style={{color:cfg.color,borderBottomColor:`${cfg.color}22`}}>## {cfg.short} ({items.length})</div>
            {items.map(a=>(
              <div key={a.id}>
                <div className="md-item"><span style={{color:'#d1d5db'}}>—</span>{a.sub&&<span style={{fontSize:9.5,color:'#9ca3af',flexShrink:0}}>[{a.sub}]</span>}<span style={{color:'#374151'}}>{a.text}</span></div>
                {type==='REFERENCE'&&a.fullText?.includes('\n')&&a.fullText.split('\n').map((l,i)=><div key={i} className="md-ref">{l}</div>)}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

/* ── ADD MODAL ──────────────────────────────────── */
function AddModal({open,onOk,onCancel}){
  const toast=useContext(TC2);
  const [type,setType]=useState('CLAIM');
  const [text,setText]=useState('');
  const reset=()=>{setType('CLAIM');setText('');};
  return (
    <Modal open={open} title="Add annotation"
      onOk={()=>{if(!text.trim()){toast('Enter extracted text','w');return;} onOk({type,text:text.trim()}); reset();}}
      onCancel={()=>{reset();onCancel();}}>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div><div className="sl">Type</div><select value={type} onChange={e=>setType(e.target.value)}>{Object.keys(TC).map(k=><option key={k} value={k}>{TC[k].short}</option>)}</select></div>
        <div><div className="sl">Extracted text</div><textarea rows={3} value={text} onChange={e=>setText(e.target.value)} placeholder="Paste or type the extracted content…"/></div>
      </div>
    </Modal>
  );
}

/* ── PROGRESS BAR component ────────────────────────── */
function ProgressBar({accepted, total}){
  const pct = total>0 ? Math.round(accepted/total*100) : 0;
  const allDone = accepted===total && total>0;
  return (
    <div style={{padding:'10px 14px 8px',borderBottom:'1px solid #f3f4f6',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:11,fontWeight:600,color:allDone?P800:'#374151'}}>
          {allDone ? '✓ All accepted' : `${accepted} of ${total} accepted`}
        </span>
        <span style={{fontSize:11,color:'#9ca3af',fontWeight:500}}>{pct}%</span>
      </div>
      <div style={{height:5,background:'#e5e7eb',borderRadius:3,overflow:'hidden'}}>
        <div style={{
          height:'100%',borderRadius:3,
          background:allDone?P600:`linear-gradient(90deg,${P600},${P300})`,
          width:`${pct}%`,transition:'width .4s cubic-bezier(.4,0,.2,1)'
        }}/>
      </div>
    </div>
  );
}

/* ── ASSET META CARD component ─────────────────────── */
// Driven by props from the live backend payload. Falls back to a
// "loading…" subtitle when meta is null.
function AssetMetaCard({assetMeta, profileId, compliance}){
  const [open,setOpen]=useState(true);
  const fields = assetMeta ? [
    {k:'Brand',     v:assetMeta.brand || '—'},
    {k:'Market',    v:assetMeta.market || '—'},
    {k:'Lang',      v:assetMeta.language || '—'},
    {k:'Doc type',  v:assetMeta.doc_type || '—'},
    {k:'Profile',   v:profileId || '—', full:true},
    {k:'Code',      v:assetMeta.code || '—'},
    {k:'Prepared',  v:assetMeta.prepared || '—'},
  ] : [];
  const subtitle = assetMeta
    ? `${assetMeta.brand}${assetMeta.market ? ' · ' + assetMeta.market : ''}`
    : 'loading…';

  // Compliance summary — surfaces MLR Precheck findings as a side-channel
  // row. Per design directive (option 2B), these don't get inline rows
  // in the X-Ray outline; they live here.
  const summary = compliance?.summary || {total:0,block:0,warn:0,info:0};
  const findings = compliance?.findings || [];

  return (
    <div className="asset-meta-card">
      <div className="amc-hdr" onClick={()=>setOpen(v=>!v)}>
        <span style={{fontSize:10,color:'#9ca3af',transition:'transform .15s',display:'inline-block',transform:open?'rotate(90deg)':'none'}}>▶</span>
        <span style={{fontSize:9,fontWeight:700,color:'#374151',textTransform:'uppercase',letterSpacing:.6}}>Asset</span>
        <span style={{fontSize:11,color:'#6b7280',marginLeft:2}}>{subtitle}</span>
        {summary.total > 0 && (
          <span style={{
            marginLeft:'auto', fontSize:10, fontWeight:600,
            padding:'2px 7px', borderRadius:10,
            color: summary.block > 0 ? '#dc2626' : summary.warn > 0 ? '#d97706' : '#059669',
            background: summary.block > 0 ? '#fef2f2' : summary.warn > 0 ? '#fffbeb' : '#f0fdf4',
            border: `1px solid ${summary.block > 0 ? '#fecaca' : summary.warn > 0 ? '#fde68a' : '#bbf7d0'}`,
          }} title={findings.map(f => `[${f.severity}] ${f.label}`).join('\n')}>
            MLR · {summary.block ? `${summary.block} block` : ''}{summary.block && summary.warn ? ' · ' : ''}{summary.warn ? `${summary.warn} warn` : ''}{!summary.block && !summary.warn ? `${summary.total} info` : ''}
          </span>
        )}
      </div>
      {open && fields.length > 0 && (
        <div className="amc-body">
          {fields.map(({k,v,full})=>(
            <div key={k} className="amc-cell" style={full?{gridColumn:'1/-1',borderRight:'none'}:{}}>
              <div className="meta-key">{k}</div>
              <div className="meta-val">{v}</div>
            </div>
          ))}
        </div>
      )}
      {open && findings.length > 0 && (
        <div style={{borderTop:'1px solid #f3f4f6', padding:'7px 11px', background:'#fafafa', maxHeight:160, overflowY:'auto'}}>
          <div style={{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',letterSpacing:.6,marginBottom:5}}>
            MLR Precheck findings
          </div>
          {findings.map((f,i)=>(
            <div key={i} style={{fontSize:11,color:'#374151',padding:'3px 0',display:'flex',gap:6,alignItems:'flex-start'}}>
              <span style={{
                flexShrink:0,fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:3,
                color: f.severity==='block' ? '#fff' : f.severity==='warn' ? '#92400e' : '#1e3a8a',
                background: f.severity==='block' ? '#dc2626' : f.severity==='warn' ? '#fef3c7' : '#dbeafe',
              }}>{f.severity.toUpperCase()}</span>
              <span title={f.rationale}>{f.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── LEGEND ─────────────────────────────────────── */
function Legend(){
  const entries=[
    {label:'Claim',color:P800},{label:'Content',color:P600},{label:'Visual',color:P300},{label:'Reg/Legal',color:G800}
  ];
  return (
    <div style={{display:'flex',gap:10,alignItems:'center'}}>
      {entries.map(({label,color})=>(
        <div key={label} style={{display:'flex',alignItems:'center',gap:3}}>
          <div style={{width:10,height:10,borderRadius:1,border:`1.5px solid ${color}`,background:'transparent',flexShrink:0}}/>
          <span style={{fontSize:9,color:'#9ca3af'}}>{label}</span>
        </div>
      ))}
    </div>
  );
}

/* ── APP ─────────────────────────────────────────── */
function App(){
  const toast=useContext(TC2);
  const [assetId,setAssetIdState]=useState(INITIAL_ASSET_ID);
  const [assetList,setAssetList]=useState([]);
  const [docHeight,setDocHeight]=useState(700);  // overlay container height; updated on fetch
  const [compliance,setCompliance]=useState({findings:[], summary:{total:0,block:0,warn:0,info:0}});
  const [meta,setMeta]=useState(null);
  const [profileId,setProfileId]=useState(null);
  const [loadError,setLoadError]=useState(null);

  const [claims,setClaims]=useState(INIT_CLAIMS);
  const [other,setOther]=useState(INIT_OTHER);
  const [selId,setSelId]=useState(null);
  const [selClaimId,setSelClaimId]=useState(null); // parent claim of selected asset
  const [tab,setTab]=useState('xray');
  const [scanning,setScanning]=useState(false);
  const [adding,setAdding]=useState(false);
  const [addModal,setAddModal]=useState(false);
  const [rerunning,setRerunning]=useState(false);
  const [checkedIds,setCheckedIds]=useState(new Set());
  const [viewMode,setViewMode]=useState('reading'); // 'reading' | 'type'
  const [allCollapsed,setAllCollapsed]=useState(false);
  const pdfRef=useRef(null);

  const setAssetId = useCallback(id => {
    setAssetIdState(id);
    const u = new URL(window.location); u.searchParams.set('asset', id);
    window.history.replaceState({}, '', u);
  }, []);

  // Load asset directory once.
  useEffect(()=>{
    fetchAssetList().then(setAssetList).catch(()=>setAssetList([]));
  },[]);

  // Re-fetch document-xray + page metadata whenever assetId changes.
  useEffect(()=>{
    let cancelled = false;
    setLoadError(null); setSelId(null); setSelClaimId(null); setCheckedIds(new Set());
    Promise.all([fetchDocumentXray(assetId), fetchPages(assetId)])
      .then(([payload, pages])=>{
        if(cancelled) return;
        const scaled = scaleRectsInPayload(payload, pages);
        setClaims(scaled.claims || []);
        setOther(scaled.elements || []);
        setMeta(scaled.meta || null);
        setProfileId(scaled.profile_id || null);
        setCompliance({
          findings: scaled.compliance_findings || [],
          summary:  scaled.compliance_summary  || {total:0,block:0,warn:0,info:0},
        });
        setDocHeight(scaled._docHeight || 700);
      })
      .catch(e=>{ if(!cancelled) setLoadError(e); });
    return ()=>{ cancelled = true; };
  },[assetId]);

  const toggleCheck=(id,val)=>setCheckedIds(p=>{const n=new Set(p);val?n.add(id):n.delete(id);return n;});
  const isChecked=id=>checkedIds.has(id);
  const checkedCount=checkedIds.size;

  const acceptChecked=()=>{
    const ids=[...checkedIds];
    setClaims(p=>p.map(c=>ids.includes(c.id)?{...c,status:'accepted'}:{...c,assets:c.assets.map(a=>ids.includes(a.id)?{...a,status:'accepted'}:a)}));
    setOther(p=>p.map(a=>ids.includes(a.id)?{...a,status:'accepted'}:a));
    setCheckedIds(new Set());
    toast(`${ids.length} item${ids.length>1?'s':''} accepted`,'s');
  };
  const deleteChecked=()=>{
    const ids=new Set(checkedIds);
    setClaims(p=>p.filter(c=>!ids.has(c.id)).map(c=>({...c,assets:c.assets.filter(a=>!ids.has(a.id))})));
    setOther(p=>p.filter(a=>!ids.has(a.id)));
    if(selId&&ids.has(selId))handleBack();
    setCheckedIds(new Set());
    toast(`${ids.size} item${ids.size>1?'s':''} deleted`);
  };

  const totalCount=claims.length+claims.reduce((s,c)=>s+c.assets.length,0)+other.length;
  const acceptedCount=[...claims,...claims.flatMap(c=>c.assets),...other].filter(a=>a.status==='accepted').length;

  // Find selected item across claims, assets, other
  const findItem=useCallback(id=>{
    const claim=claims.find(c=>c.id===id);
    if(claim) return {item:claim,isClaim:true};
    for(const c of claims){const a=c.assets.find(a=>a.id===id);if(a)return {item:a,isClaim:false,parentId:c.id};}
    const o=other.find(a=>a.id===id);
    if(o) return {item:o,isClaim:false};
    return null;
  },[claims,other]);

  const handleSel=useCallback((id,parentId)=>{
    if(selId===id){setSelId(null);setSelClaimId(null);return;}
    setSelId(id);
    setSelClaimId(parentId||null);
    const found=findItem(id);
    if(found?.item?.rect&&pdfRef.current) pdfRef.current.scrollTo({top:Math.max(0,found.item.rect.t-80),behavior:'smooth'});
  },[selId,findItem]);

  const handleBack=()=>{setSelId(null);setSelClaimId(null);};

  const handleDelClaim=id=>{setClaims(p=>p.filter(c=>c.id!==id));if(selId===id)handleBack();toast('Claim deleted');};
  const handleAccClaim=id=>{setClaims(p=>p.map(c=>c.id===id?{...c,status:'accepted'}:c));toast('Claim accepted','s');};
  const handleDelOther=id=>{setOther(p=>p.filter(a=>a.id!==id));if(selId===id)handleBack();toast('Deleted');};
  const handleAccOther=id=>{setOther(p=>p.map(a=>a.id===id?{...a,status:'accepted'}:a));toast('Accepted','s');};
  const handleSave=(id,u)=>{
    setClaims(p=>p.map(c=>c.id===id?{...c,...u}:c.assets.find(a=>a.id===id)?{...c,assets:c.assets.map(a=>a.id===id?{...a,...u}:a)}:c));
    setOther(p=>p.map(a=>a.id===id?{...a,...u}:a));
    toast('Saved','s');
  };
  const handleRerun=id=>{toast('Rerunning…','i');setTimeout(()=>toast('Updated','s'),1800);};
  const accAll=()=>{
    setClaims(p=>p.map(c=>({...c,status:'accepted',assets:c.assets.map(a=>({...a,status:'accepted'}))})));
    setOther(p=>p.map(a=>({...a,status:'accepted'})));
    handleBack(); toast('All accepted','s');
  };
  const rerunAll=()=>{
    setRerunning(true);
    setTimeout(()=>{setClaims(INIT_CLAIMS);setOther(INIT_OTHER);handleBack();setRerunning(false);toast('X-Ray complete','s');},2200);
  };

  const found=selId?findItem(selId):null;

  // All rects to render
  const allRects=[
    ...claims.map(c=>({id:c.id,type:'CLAIM',sub:null,rect:c.rect,label:c.name})),
    ...claims.flatMap(c=>c.assets.map(a=>({id:a.id,type:a.kind==='visual'?'DATA_VIS':'BODY',sub:a.kind,rect:a.rect,label:a.text.slice(0,28)}))),
    ...other.map(a=>({id:a.id,type:a.type,sub:a.sub,rect:a.rect,label:a.text.slice(0,28)})),
  ];

  // Filter chips for xray tab
  const chipGroups=[
    {key:'ALL',label:`All ${totalCount}`,color:'#555'},
    {key:'claim',label:`Claims ${claims.length}`,color:P800},
    {key:'content',label:`Content ${other.filter(a=>a.type==='BODY').length}`,color:P600},
    {key:'visual',label:`Visuals ${other.filter(a=>a.type==='DATA_VIS').length}`,color:P300},
    {key:'legal',label:`Reg/Legal ${other.filter(a=>a.type==='REGULATORY'||a.type==='LEGAL'||a.type==='REFERENCE'||a.type==='AUD_RESTR').length}`,color:G800},
  ];
  const [chipFilter,setChipFilter]=useState('ALL');

  // Document name for the header — prefer the brand+market combination, fall back to assetId.
  const headerDocName = meta
    ? (meta.code ? `${meta.brand} · ${meta.market} · ${meta.code}` : `${meta.brand} · ${meta.market}`)
    : assetId;
  const headerDocType = (meta?.doc_type || 'document').toUpperCase().replace('_', ' ');

  return (
    <>
      {/* ── SHAMAN MLR HEADER ────────────────────── */}
      <div className="mlr-header">
        <div className="mlr-mark">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M16 6c0-2.2-1.8-4-4-4H10C7.8 2 6 3.8 6 6c0 2.2 1.8 4 4 4h4c2.2 0 4 1.8 4 4 0 2.2-1.8 4-4 4h-4c-2.2 0-4-1.8-4-4"
              stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </div>
        <span className="mlr-title">Shaman MLR X-Ray</span>
        <span className="mlr-sep"/>
        <span className="mlr-doc" title={assetId}>{headerDocName}</span>
        <span className="mlr-doctype">{headerDocType}</span>

        <div style={{flex:1}}/>

        <div style={{display:'flex',alignItems:'center',gap:0,marginRight:6}}>
          <span className="mlr-avatar"     title="Frances Smith">FS</span>
          <span className="mlr-avatar alt" title="Maurice van Leeuwen" style={{marginLeft:-6}}>ML</span>
        </div>
        <button className="mlr-libbtn" onClick={()=>toast('Library — coming soon','i')}>Library</button>
      </div>

      {/* ── TOOLBAR ──────────────────────────────── */}
      <div className="toolbar">
        <span style={{fontSize:12,fontWeight:500,color:'#111827',whiteSpace:'nowrap'}}>
          {assetId}
        </span>
        {/* Asset switcher — populated by /api/assets */}
        <select value={assetId} onChange={e=>setAssetId(e.target.value)}
          style={{marginLeft:6,fontSize:11,padding:'2px 6px',border:'1px solid #e5e7eb',
                  borderRadius:4,background:'#fff',cursor:'pointer',fontFamily:'inherit'}}>
          {assetList.map(a => (
            <option key={a.asset_id} value={a.asset_id}>{a.label}</option>
          ))}
        </select>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'#fff',border:'1px solid #e5e7eb',borderRadius:5,padding:'2px 9px'}}>
          <span style={{fontSize:11,fontWeight:600,color:P600}}>{totalCount-acceptedCount} remaining</span>
          <span style={{color:'#e5e7eb',fontSize:10}}>·</span>
          <span style={{fontSize:11,color:'#888'}}>{acceptedCount} accepted</span>
        </div>
        <div style={{flex:1}}/>
        <button className="btn btn-ghost"
          onClick={()=>{setAdding(true);toast('Click document to place annotation','i');}}>+ Add</button>
        <button className="btn btn-ghost" style={{gap:4}}
          onClick={rerunAll} disabled={rerunning}>
          <span className={rerunning?'spin':''} style={{display:'inline-block'}}>↺</span>
          {rerunning?'Scanning…':'Re-scan'}
        </button>
        <button className="btn btn-primary" onClick={accAll}>✓ Accept all</button>
      </div>

      {/* ── MAIN ─────────────────────────────────── */}
      <div className="main">

        {/* PDF pane */}
        <div ref={pdfRef} className="pdf-pane"
          onClick={adding?()=>{setAdding(false);setAddModal(true);}:undefined}>
          <div style={{maxWidth:760,margin:'0 auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:10,color:'#9ca3af',fontFamily:'inherit'}}>Page 1/1</span>
              <Legend/>
            </div>
            <div style={{position:'relative',boxShadow:'0 3px 20px rgba(0,0,0,.08)',borderRadius:2}}>
              {adding&&<div className="add-ov"><span style={{fontSize:12,color:P600,fontWeight:600,background:'rgba(255,255,255,.96)',padding:'7px 13px',borderRadius:5,boxShadow:'0 2px 8px rgba(0,0,0,.1)'}}>Click to place annotation</span></div>}
              <DocumentImage assetId={assetId} height={docHeight}/>
              {allRects.map(r=><AnnRect key={r.id} {...r} sel={r.id===selId} onSel={handleSel} adding={adding}/>)}
            </div>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="right-panel">
          {/* Tabs + controls */}
          <div style={{borderBottom:'1px solid #f3f4f6',flexShrink:0,display:'flex',alignItems:'center',padding:'0 6px 0 8px'}}>
            {[['xray','X-Ray']].map(([t,l])=>(
              <button key={t} className="tab-btn"
                style={{fontWeight:tab===t?700:400,color:tab===t?P800:'#9ca3af',borderBottomColor:tab===t?P800:'transparent'}}
                onClick={()=>{setTab(t);handleBack();}}>
                {l}
                {t==='xray'&&<span style={{fontSize:10,color:'#d1d5db',marginLeft:3,fontWeight:400}}>{totalCount}</span>}
              </button>
            ))}
            <div style={{flex:1}}/>
            {tab==='xray'&&(
              <div style={{display:'flex',alignItems:'center',gap:4,paddingRight:4}}>
                <Tip text={viewMode==='reading'?'Switch to By Type view':'Switch to Reading Order view'}>
                  <button onClick={()=>setViewMode(v=>v==='reading'?'type':'reading')}
                    style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',
                      border:'1px solid #e5e7eb',borderRadius:5,
                      background:viewMode==='type'?'#ecfdf5':'#fff',
                      fontSize:11,fontWeight:600,cursor:'pointer',
                      color:viewMode==='type'?P800:'#6b7280',
                      fontFamily:'inherit',whiteSpace:'nowrap',transition:'all .15s'}}>
                    <span style={{fontSize:10}}>{viewMode==='reading'?'⇅':'⊞'}</span>
                    {viewMode==='reading'?'Reading Order':'By Type'}
                  </button>
                </Tip>
                <Tip text={allCollapsed?"Expand all":"Collapse all"}>
                  <button className="btn-icon" onClick={()=>setAllCollapsed(v=>!v)}
                    style={{fontSize:11,padding:'2px 7px',fontWeight:600,
                      color:allCollapsed?P600:'#9ca3af',
                      border:allCollapsed?`1px solid ${P300}`:'1px solid #e5e7eb',
                      borderRadius:5,background:'#fff'}}>
                    {allCollapsed?'Expand':'Collapse'}
                  </button>
                </Tip>
                <Tip text="Re-scan">
                  <button className="btn-icon" onClick={rerunAll}>
                    <span className={rerunning?'spin':''} style={{display:'inline-block'}}>↺</span>
                  </button>
                </Tip>
              </div>
            )}

          </div>

          {/* X-RAY TAB */}
          {tab==='xray'&&(
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
              {/* Filter chips */}
              <div style={{display:'flex',gap:5,padding:'7px 10px 6px',overflowX:'auto',borderBottom:'1px solid #f3f4f6',flexShrink:0}}>
                {chipGroups.map(({key,label,color})=>(
                  <button key={key} className={`fchip${chipFilter===key?' active':''}`}
                    style={{color}} onClick={()=>setChipFilter(chipFilter===key&&key!=='ALL'?'ALL':key)}>
                    {label}
                  </button>
                ))}
              </div>
              {/* Progress bar */}
              <ProgressBar accepted={acceptedCount} total={totalCount}/>
              {/* Asset metadata card */}
              <AssetMetaCard assetMeta={meta} profileId={profileId} compliance={compliance}/>
              {/* Document outline — top-to-bottom flow */}
              <DocOutline
                claims={chipFilter==='ALL'||chipFilter==='claim' ? claims : []}
                other={other.filter(a=>{
                  if(chipFilter==='ALL') return true;
                  if(chipFilter==='content') return a.type==='BODY';
                  if(chipFilter==='visual') return a.type==='DATA_VIS';
                  if(chipFilter==='legal') return a.type==='REGULATORY'||a.type==='LEGAL'||a.type==='REFERENCE'||a.type==='AUD_RESTR';
                  return true;
                })}
                selId={selId}
                onSel={handleSel}
                onSelAsset={(aid,cid)=>handleSel(aid,cid)}
                onDelClaim={handleDelClaim}
                onAccClaim={handleAccClaim}
                onDelOther={handleDelOther}
                onAccOther={handleAccOther}
                checked={isChecked}
                onCheck={toggleCheck}
                viewMode={viewMode}
                allCollapsed={allCollapsed}
                onAccept={id=>{handleAccOther(id);}}
                onAcceptAll={group=>{
                  if(group==='claims'){setClaims(p=>p.map(c=>({...c,status:'accepted',assets:c.assets.map(a=>({...a,status:'accepted'}))})));toast('All claims accepted','s');}
                  else if(group==='content'){setOther(p=>p.map(a=>a.type==='BODY'?{...a,status:'accepted'}:a));toast('All content accepted','s');}
                  else if(group==='regulatory'){setOther(p=>p.map(a=>(a.type==='REGULATORY'||a.type==='LEGAL'||a.type==='AUD_RESTR')?{...a,status:'accepted'}:a));toast('All regulatory accepted','s');}
                  else if(group==='references'){setOther(p=>p.map(a=>a.type==='REFERENCE'?{...a,status:'accepted'}:a));toast('All references accepted','s');}
                  else if(group==='visuals'){setOther(p=>p.map(a=>a.type==='DATA_VIS'?{...a,status:'accepted'}:a));toast('All visuals accepted','s');}
                }}
              />
              {/* Floating bulk action bar */}
              {checkedCount>0&&(
                <div className="bulk-bar">
                  <span style={{fontSize:12,fontWeight:600,color:'#fff'}}>{checkedCount} selected</span>
                  <div style={{flex:1}}/>
                  <button className="btn" style={{background:'#059669',color:'#fff',border:'none',fontSize:12,padding:'5px 12px'}}
                    onClick={acceptChecked}>✓ Accept {checkedCount}</button>
                  <button className="btn" style={{background:'#dc2626',color:'#fff',border:'none',fontSize:12,padding:'5px 12px'}}
                    onClick={deleteChecked}>✕ Delete</button>
                  <button className="btn-icon" style={{color:'#888',fontSize:14,marginLeft:2}}
                    onClick={()=>setCheckedIds(new Set())}>✕</button>
                </div>
              )}
              {/* Detail slide */}
              <div className={`panel-view${found?' vis':''}`}>
                {found&&<DetailPanel item={found.item} isClaim={found.isClaim} onBack={handleBack} onSave={handleSave} onDel={found.isClaim?handleDelClaim:handleDelOther} onAcc={found.isClaim?handleAccClaim:handleAccOther} onRerun={handleRerun}/>}
              </div>
            </div>
          )}




        </div>
      </div>

      {/* ── BOTTOM BAR ───────────────────────────── */}
      <div className="btmbar">
        <span style={{fontSize:10,fontWeight:600,color:'#d1d5db',letterSpacing:.6,textTransform:'uppercase',marginRight:4}}>Use structured output →</span>
        {[{l:'Compile',c:P600,d:'Build a claims library'},{l:'Repurpose',c:P800,d:'Generate content variants'},{l:'Compare',c:G800,d:'Diff against another document'}].map(({l,c,d})=>(
          <Tip key={l} text={d} wide><button className="ds-btn" onClick={()=>toast(`${l}: coming soon`,'i')} style={{color:c,borderColor:`${c}44`,background:`${c}08`}}>{l}</button></Tip>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontSize:10,color:'#d1d5db'}}>{totalCount} structures · {claims.length} claims · {other.filter(a=>a.type==='REGULATORY'||a.type==='LEGAL').length} reg</span>
      </div>

      <AddModal open={addModal} onOk={({type,text})=>{
        const id='a'+Date.now();
        setOther(p=>[...p,{id,type,sub:null,conf:80,status:'new',text,fullText:text,refs:[],rect:{t:440,l:5,w:300,h:50}}]);
        setAddModal(false); toast('Annotation added','s');
      }} onCancel={()=>setAddModal(false)}/>

      <style>{`@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}`}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
</html>
